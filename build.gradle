plugins {
    id 'java-library'
}

group = 'com.github.catexjc'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.jgrapht:jgrapht-core:1.5.2'
    testImplementation 'org.testng:testng:7.9.0'
}

test {
    useTestNG()
}
